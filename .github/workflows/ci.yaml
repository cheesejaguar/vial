name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Vet
        run: go vet ./...

      - name: Test
        run: |
          go test -race ./internal/vault/... \
                        ./internal/parser/... \
                        ./internal/matcher/... \
                        ./internal/alias/... \
                        ./internal/config/... \
                        ./internal/llm/... \
                        ./internal/project/... \
                        ./internal/scanner/... \
                        ./internal/sync/...

      - name: Build
        run: go build -o /dev/null ./cmd/vial
